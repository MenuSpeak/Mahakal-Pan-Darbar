  function getImagePath(imgFile) {
    return "img/" + imgFile;
  }

  const WHATSAPP_NUMBER = "919588682169";
  
  function getWhatsappOrderLink(itemName) {
    const message = `नमस्कार! मला महाकाल पान दरबार मधून "${itemName}" ऑर्डर करायचं आहे. कृपया मला पुढील प्रक्रिया सांगा. धन्यवाद.`;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
  }

  let activeCategory = "all";
  let searchTerm = "";

  function renderMenu() {
    let filtered = menuItems.filter(item => {
      if (activeCategory !== "all" && item.cat !== activeCategory) return false;
      if (searchTerm !== "") {
        const fullText = (item.nameMar + item.nameEng + item.cat + (item.desc || "")).toLowerCase();
        if (!fullText.includes(searchTerm.toLowerCase())) return false;
      }
      return true;
    });
    
    const grid = document.getElementById("menuGrid");
    if(filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">❌ कोणतेही पान सापडले नाही | No item found</div>`;
      return;
    }
    
    grid.innerHTML = filtered.map(item => {
      const orderLink = getWhatsappOrderLink(item.nameMar);
      const descHtml = item.desc ? `<div class="item-desc">${item.desc}</div>` : '';
      return `
        <div class="menu-card" data-id="${item.id}" data-image="${getImagePath(item.imgFile)}" data-itemname="${item.nameMar}">
          <div class="item-header">
            <div class="item-name">${item.nameMar} <small>| ${item.nameEng}</small></div>
            <div class="item-price">₹${item.price}</div>
          </div>
          ${descHtml}
          <a href="${orderLink}" target="_blank" class="order-wa-btn" onclick="event.stopPropagation();">
            <i class="fab fa-whatsapp"></i> ऑर्डर करा / Order
          </a>
        </div>
      `;
    }).join("");
    
    document.querySelectorAll('.menu-card').forEach(card => {
      const newCard = card.cloneNode(true);
      card.parentNode.replaceChild(newCard, card);
      newCard.addEventListener('click', (e) => {
        if(e.target.closest('.order-wa-btn')) return;
        const imgUrl = newCard.getAttribute('data-image');
        const itemName = newCard.getAttribute('data-itemname') || "महाकाल पान";
        openModalWithImage(imgUrl, itemName);
      });
    });
  }

  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  
  function openModalWithImage(src, title) {
    modalImg.src = src;
    modalImg.alt = title;
    modal.classList.add("active");
    document.body.style.overflow = "hidden";
    
    modalImg.onerror = function() {
      this.src = `https://placehold.co/600x500/2a2a2a/d4af37?text=${encodeURIComponent(title)}&font=playfair`;
    };
  }
  
  function closeModal() {
    modal.classList.remove("active");
    document.body.style.overflow = "";
  }
  
  document.getElementById("closeModalBtn").addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => {
    if(e.target === modal) closeModal();
  });

  document.querySelectorAll(".gallery-item").forEach(gItem => {
    gItem.addEventListener("click", () => {
      let imgSrc = gItem.getAttribute("data-img");
      if(imgSrc) {
        openModalWithImage(imgSrc, "पान स्पेशल");
      }
    });
  });

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeCategory = tab.getAttribute("data-cat");
      renderMenu();
    });
  });
  
  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    renderMenu();
  });

  renderMenu();
</script>
